<!DOCTYPE html>

<title>SF6 GIS Calculator — ฝบร. กฟน.</title>
<style>
  :root {
    --color-background-primary:#ffffff;--color-background-secondary:#f7f7f8;
    --color-text-primary:#1a1a1a;--color-text-secondary:#6b7280;
    --color-border-primary:#9ca3af;--color-border-secondary:#d1d5db;
    --color-border-tertiary:#e5e7eb;
    --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --font-mono:'SF Mono','Fira Code','Consolas',monospace;
    --touch-min:44px; /* minimum touch target */
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font-sans);background:var(--color-background-primary);color:var(--color-text-primary);padding:12px;min-height:100vh;font-size:14px;}
  input,select{width:100%;padding:8px 10px;border:0.5px solid var(--color-border-secondary);border-radius:6px;font-size:14px;background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-sans);min-height:var(--touch-min);}
  input:focus,select:focus{outline:none;border-color:var(--color-border-primary);}
  button{font-family:var(--font-sans);cursor:pointer;min-height:var(--touch-min);touch-action:manipulation;}
  ::-webkit-scrollbar{width:4px;height:4px;}
  ::-webkit-scrollbar-thumb{background:var(--color-border-secondary);border-radius:2px;}
  h1{font-size:18px;font-weight:600;margin-bottom:4px;}
  .app-badge{font-size:12px;padding:2px 9px;background:rgba(55,138,221,0.1);color:#185FA5;border-radius:10px;border:0.5px solid rgba(55,138,221,0.3);}

  /* ── App header ── */
  .app-header{display:flex;align-items:center;gap:10px;padding-bottom:12px;margin-bottom:12px;border-bottom:1px solid var(--color-border-tertiary);}

  /* ── Drawer overlay ── */
  .drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;}
  .drawer-overlay.open{display:block;}
  .drawer-panel{position:fixed;top:0;left:0;bottom:0;width:85%;max-width:320px;background:var(--color-background-primary);z-index:201;overflow-y:auto;padding:16px;transform:translateX(-100%);transition:transform 0.25s ease;box-shadow:4px 0 20px rgba(0,0,0,0.15);}
  .drawer-panel.open{transform:translateX(0);}
  .drawer-close{position:absolute;top:12px;right:12px;background:none;border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:4px 8px;font-size:16px;cursor:pointer;min-height:36px;color:var(--color-text-secondary);}

  /* ── Hamburger button (mobile only) ── */
  .btn-menu{display:none;background:none;border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:6px 10px;font-size:18px;cursor:pointer;min-height:var(--touch-min);color:var(--color-text-primary);}

  /* ── Tab bar ── */
  .tab-bar{display:flex;overflow-x:auto;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:12px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .tab-bar::-webkit-scrollbar{display:none;}
  .tab-btn{flex-shrink:0;padding:8px 14px;font-size:13px;border:none;background:none;cursor:pointer;white-space:nowrap;min-height:40px;touch-action:manipulation;}

  /* ── Bay scroll container ── */
  .bay-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px;}
  .bay-row{display:inline-flex;gap:8px;align-items:flex-start;min-width:100%;}

  /* ── Tablet (768px+): sidebar always visible ── */
  @media (min-width:768px){
    .btn-menu{display:none !important;}
    .drawer-overlay,.drawer-panel{display:none !important;}
    .sidebar-desktop{display:block !important;}
    body{padding:16px;}
  }
  /* ── Mobile (<768px): drawer mode ── */
  @media (max-width:767px){
    .btn-menu{display:flex;align-items:center;justify-content:center;}
    .sidebar-desktop{display:none;}
    body{padding:10px;}
    h1{font-size:16px;}
    input,select{font-size:16px;} /* prevent iOS zoom */
    .tab-btn{padding:8px 12px;font-size:12px;}
  }
</style>
</head>

<div class="app-header">

    <div style="font-size:12px;color:#6b7280;">ฝบร. การไฟฟ้านครหลวง</div>
  </div>
  <span class="app-badge" id="versionBadge" style="cursor:pointer;" title="ดู Changelog">v10.5</span>
</div>
<div id="drawerOverlay" class="drawer-overlay" onclick="closeDrawer()"></div>
<div id="drawerPanel" class="drawer-panel">

<div id="root" style="position:relative;min-height:600px;"></div>

function openDrawer(){
  document.getElementById('drawerOverlay').classList.add('open');

}
function closeDrawer(){
  document.getElementById('drawerOverlay').classList.remove('open');

}
function isMobile(){return window.innerWidth<768;}
document.addEventListener('DOMContentLoaded',()=>{
  const badge=document.getElementById('versionBadge');
  if(badge)badge.addEventListener('click',()=>window.dispatchEvent(new CustomEvent('openChangelog')));
});
</script>

/* ── SmartSelect: dropdown + "+ เพิ่มใหม่" with duplicate check ── */
function SmartSelect({options,value,onChange,onAddNew,placeholder,disabled}){
  const [adding,sAdd]=useState(false);const [nv,sNv]=useState('');const [err,sErr]=useState('');
  const norm=s=>s.toLowerCase().replace(/\s+/g,'');
  function tryAdd(){
    const t=nv.trim();if(!t){sErr('กรุณากรอก');return;}
    if(options.some(o=>norm(o)===norm(t))){sErr('ชื่อซ้ำ (รวมถึงการเว้นวรรค)');return;}
    onAddNew(t);onChange(t);sAdd(false);sNv('');sErr('');
  }
  if(adding)return h('div',null,
    h('div',{style:{display:'flex',gap:3}},
      h('input',{value:nv,onChange:e=>{sNv(e.target.value);sErr('');},placeholder:placeholder||'กรอกชื่อใหม่',
        onKeyDown:e=>{if(e.key==='Enter')tryAdd();if(e.key==='Escape'){sAdd(false);sErr('');sNv('');}},
        autoFocus:true,style:{flex:1}}),
      h('button',{style:{...sBP,padding:'3px 7px',flexShrink:0},onClick:tryAdd},'✓'),
      h('button',{style:{...sB,padding:'3px 6px',flexShrink:0},onClick:()=>{sAdd(false);sErr('');sNv('');}},h('span',null,'✕'))
    ),
    err&&h('div',{style:{fontSize:11,color:'#E24B4A',marginTop:2}},err)
  );
  return h('select',{value:value||'',disabled:!!disabled,
    onChange:e=>{if(e.target.value==='__ADD__')sAdd(true);else onChange(e.target.value);}},
    h('option',{value:''},'— เลือก —'),
    options.map(o=>h('option',{key:o,value:o},o)),
    h('option',{value:'__ADD__'},'+ เพิ่มใหม่...')
  );
}

/* helper */
const modTotal=(m,sp)=>sp?((m.sfR??m.sf6)+(m.sfY??m.sf6)+(m.sfB??m.sf6)):m.sf6;
/* SP: count each R/Y/B phase separately; non-SP: 1 point per module */
const modPoints=(m,sp)=>sp?3:1;
const modEdited=(m,sp)=>sp?((m.editedR?1:0)+(m.editedY?1:0)+(m.editedB?1:0)):(m.edited?1:0);
const modAllEdited=(m,sp)=>sp?(!!m.editedR&&!!m.editedY&&!!m.editedB):!!m.edited;
/* bayTot helpers */
const bayAllEdited=(bay,sp)=>bay.modules.length>0&&bay.modules.every(m=>modAllEdited(m,sp));
const bayModSum=(bay,sp)=>bay.modules.reduce((s,m)=>s+modTotal(m,sp),0);
const bayTot=(bay,sp)=>{
  if((bay.sf6Bay||0)>0&&!bayAllEdited(bay,sp))return bay.sf6Bay;
  return bayModSum(bay,sp);
};
const bayUseNameplate=(bay,sp)=>(bay.sf6Bay||0)>0&&!bayAllEdited(bay,sp);
const bayOverridden=(bay,sp)=>(bay.sf6Bay||0)>0&&bayAllEdited(bay,sp);

/* ── App ── */
function App(){
  const [subs,setSubs]=useState(ISUBS);const [lib,setLib]=useState(ILIB);
  const [mt,setMt]=useState(['CB','DS','Busbar','BusA','BusB','CT','VT','Cable','ES','LA','Buffer']);
  const [eqTypes,setEqTypes]=useState(['HV GIS','MV GIS','GCB']);
  const [eqDB,setEqDB]=useState(()=>JSON.parse(JSON.stringify(INIT_EQ_DB)));
  const [eqTpls,setEqTpls]=useState([]);const [subTpls,setSubTpls]=useState([]);
  const [selSub,setSelSub]=useState(null);const [selEq,setSelEq]=useState(null);const [selBay,setSelBay]=useState(null);
  const [tab,setTab]=useState('designer');const [confirm,setConfirm]=useState(null);const [saveDlg,setSaveDlg]=useState(null);const [protectedConfirm,setProtectedConfirm]=useState(null);
  const [sbW,setSbW]=useState(280);const dragging=React.useRef(false);const startX=React.useRef(0);const startW=React.useRef(280);
  /* ── Sync state ── */
  /* ── ค่า Default URL (แก้ตรงนี้เพื่อ pre-fill ให้ทุกคน) ── */
  const DEFAULT_SHEETS_URL='https://script.google.com/macros/s/AKfycbxm08MUDofR4IltnFmga-95u-UmOfGkPp3c4MQArq_JSNlx-EYZymPR5-69oIPgZXXq/exec';

  const [sheetsUrl,setSheetsUrl]=useState(()=>{
    try{return localStorage.getItem('sf6_sheets_url')||DEFAULT_SHEETS_URL;}
    catch(e){return DEFAULT_SHEETS_URL;}
  });
  const [syncStatus,setSyncStatus]=useState('idle'); /* idle/loading/saving/success/error */
  const [lastSync,setLastSync]=useState(null);
  const [lastSavedBy,setLastSavedBy]=useState('');
  const [showSettings,setShowSettings]=useState(false);
  const [showChangelog,setShowChangelog]=useState(false);
  React.useEffect(()=>{
    const fn=()=>setShowChangelog(true);
    window.addEventListener('openChangelog',fn);
    return()=>window.removeEventListener('openChangelog',fn);
  },[]);
  const [savedByName,setSavedByName]=useState(''); /* sessionStorage: ล้างทุกครั้งที่ปิด tab */
  const [hasLoaded,setHasLoaded]=useState(false); /* ต้องโหลดข้อมูลก่อนจึงกรอกรหัสได้ */
  /* ── Sync helpers ── */
  function getStateSnapshot(){
    return {subs,lib,mt,eqTypes,eqDB,eqTpls,subTpls,version:1,savedAt:Date.now()};
  }
  function restoreSnapshot(d){
    if(d.subs)setSubs(d.subs);
    if(d.lib)setLib(d.lib);
    if(d.mt)setMt(d.mt);
    if(d.eqTypes)setEqTypes(d.eqTypes);
    if(d.eqDB)setEqDB(d.eqDB);
    if(d.eqTpls)setEqTpls(d.eqTpls);
    if(d.subTpls)setSubTpls(d.subTpls);
  }
  async function loadFromSheets(){
    if(!sheetsUrl){setShowSettings(true);return;}
    setSyncStatus('loading');
    try{
      const res=await fetch(sheetsUrl+'?t='+Date.now());
      const json=await res.json();
      if(json.ok&&json.data&&Object.keys(json.data).length>0){
        restoreSnapshot(json.data);
        setLastSync(new Date());
        setLastSavedBy(json.savedBy||'');
      }
      setHasLoaded(true);
      setSyncStatus('success');
      setTimeout(()=>setSyncStatus('idle'),3000);
    }catch(e){setSyncStatus('error');setTimeout(()=>setSyncStatus('idle'),4000);}
  }
  async function saveToSheets(){
    if(!sheetsUrl){setShowSettings(true);return;}
    const name=savedByName||'ไม่ระบุ';
    setSyncStatus('saving');
    try{
      const body=JSON.stringify({data:getStateSnapshot(),savedBy:name,version:1});
      /* Use text/plain to avoid CORS preflight; GAS accepts it fine */
      const res=await fetch(sheetsUrl,{method:'POST',headers:{'Content-Type':'text/plain'},body});
      const json=await res.json();
      if(json.ok){
        setLastSync(new Date());setLastSavedBy(name);
        setSyncStatus('success');setTimeout(()=>setSyncStatus('idle'),3000);
      }else{setSyncStatus('error');setTimeout(()=>setSyncStatus('idle'),4000);}
    }catch(e){setSyncStatus('error');setTimeout(()=>setSyncStatus('idle'),4000);}
  }
  function saveSettings(url){
    setSheetsUrl(url);
    try{localStorage.setItem('sf6_sheets_url',url);}catch(e){}
    setShowSettings(false);
  }
  React.useEffect(()=>{
    function onMove(e){if(!dragging.current)return;const dx=e.clientX-startX.current;const nw=Math.max(160,Math.min(480,startW.current+dx));setSbW(nw);}
    function onUp(){dragging.current=false;document.body.style.cursor='';document.body.style.userSelect='';}
    document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
    return()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};
  },[]);
  function onResizerDown(e){dragging.current=true;startX.current=e.clientX;startW.current=sbW;document.body.style.cursor='col-resize';document.body.style.userSelect='none';e.preventDefault();}
  const sub=subs.find(s=>s.id===selSub);const eq=sub?sub.equipment.find(e=>e.id===selEq):null;
  function askConfirm(msg,fn){setConfirm({msg,fn});}
  /* askDelete:
     - ผู้ลบ === ผู้สร้าง → Confirm ปกติ
     - ผู้ลบ !== ผู้สร้าง / ไม่มี createdBy / ยังไม่ได้ใส่รหัสพนักงาน → ต้องใส่รหัส 2235636
  */
  function askDelete(item,msg,fn){
    const cb=String((item&&item.createdBy)||'').trim();
    const me=String(savedByName||'').trim();
    if(me.length===7&&cb.length>0&&cb===me){
      setConfirm({msg,fn});
    } else {
      setProtectedConfirm({msg,createdBy:cb||'ไม่ระบุ',fn});
    }
  }
  function addSub(d){const s={...d,createdBy:savedByName};setSubs(p=>[...p,s]);setSelSub(s.id);setSelEq(s.equipment&&s.equipment[0]?s.equipment[0].id:null);setSelBay(null);}
  function delSub(sid){setSubs(p=>p.filter(s=>s.id!==sid));if(selSub===sid){const r=subs.find(s=>s.id!==sid);setSelSub(r?r.id:null);setSelEq(null);setSelBay(null);}}
  function updateSub(sid,d){setSubs(p=>uS(p,sid,x=>({...x,...d})));}
  function addEq(sid,e){const ne={...e,id:nid(),createdBy:savedByName};setSubs(p=>uS(p,sid,x=>({...x,equipment:[...x.equipment,ne]})));setSelEq(ne.id);setSelBay(null);}
  function delEq(sid,eid){setSubs(p=>uS(p,sid,x=>({...x,equipment:x.equipment.filter(e=>e.id!==eid)})));if(selEq===eid)setSelEq(null);}
  function updateEq(sid,eid,d){setSubs(p=>uE(p,sid,eid,x=>({...x,...d})));}
  function moveEq(fS,eid,tS){setSubs(p=>{const fSub=p.find(s=>s.id===fS);const mE=fSub?fSub.equipment.find(e=>e.id===eid):null;if(!mE)return p;let r=uS(p,fS,s=>({...s,equipment:s.equipment.filter(e=>e.id!==eid)}));return uS(r,tS,s=>({...s,equipment:[...s.equipment,mE]}));});setSelSub(tS);setSelEq(eid);setSelBay(null);}
  function updateMod(mid,nd){const old=lib.find(m=>m.id===mid);if(!old)return;const{type:ot,mfr:om,model:omd}=old;setLib(p=>p.map(m=>m.id===mid?{...m,...nd}:m));setSubs(p=>p.map(su=>({...su,equipment:su.equipment.map(e=>({...e,bays:e.bays.map(b=>({...b,modules:b.modules.map(bm=>(bm.type===ot&&bm.mfr===om&&bm.model===omd&&!bm.edited)?{...bm,...nd,uid:bm.uid}:bm)}))}))})  ));}
  function onSaveEqTpl(eq){setSaveDlg({title:'บันทึก รูปแบบอุปกรณ์',existing:eqTpls,onSave:nm=>{setEqTpls(p=>[...p,{...cpEq(eq),id:nid(),name:nm}]);setSaveDlg(null);}});}
  function onSaveSubTpl(sub){setSaveDlg({title:'บันทึก รูปแบบสถานี',existing:subTpls,onSave:nm=>{setSubTpls(p=>[...p,{...cpSub(sub,nm),id:nid(),name:nm}]);setSaveDlg(null);}});}
  const addBayFn=(sid,eid,b)=>setSubs(p=>uE(p,sid,eid,x=>({...x,bays:[...x.bays,{...b,sf6Bay:0,createdBy:savedByName}]})));
  const edBayTotFn=(sid,eid,bid,val)=>setSubs(p=>uB(p,sid,eid,bid,b=>({...b,sf6Bay:val})));
  const rmModFn=(sid,eid,bid,uid)=>setSubs(p=>uB(p,sid,eid,bid,b=>({...b,modules:b.modules.filter(m=>m.uid!==uid)})));
  const addModFn=(sid,eid,bid,mod)=>setSubs(p=>uB(p,sid,eid,bid,b=>({...b,modules:[...b.modules,mod]})));
  const edSf6Fn=(sid,eid,bid,uid,sf6)=>setSubs(p=>uB(p,sid,eid,bid,b=>({...b,modules:b.modules.map(m=>m.uid===uid?{...m,sf6,edited:true}:m)})));
  const edSf6PhaseFn=(sid,eid,bid,uid,ph,sf6)=>setSubs(p=>uB(p,sid,eid,bid,b=>({...b,modules:b.modules.map(m=>m.uid===uid?{...m,[`sf${ph}`]:sf6,[`edited${ph}`]:true,edited:true}:m)})));
  const saveTplFn=(sid,eid,tpl)=>setSubs(p=>uE(p,sid,eid,x=>({...x,templates:[...x.templates,tpl]})));
  const delBayFn=(sid,eid,bid)=>setSubs(p=>uE(p,sid,eid,x=>({...x,bays:x.bays.filter(b=>b.id!==bid)})));
  const delTplFn=(sid,eid,tid)=>setSubs(p=>uE(p,sid,eid,x=>({...x,templates:x.templates.filter(t=>t.id!==tid)})));
  const reorderFn=(sid,eid,bs)=>setSubs(p=>uE(p,sid,eid,x=>({...x,bays:bs})));
  const TABS=[{k:'designer',l:'Bay Configuration'},{k:'library',l:'Compartment Library'},{k:'templates',l:'Templates'},{k:'summary',l:'Summary'}];
  /* ── Drawer: mount sidebar into #drawerContent on mobile ── */
  React.useEffect(()=>{
    const dc=document.getElementById('drawerContent');
    if(!dc)return;
    if(window.innerWidth<768){
      ReactDOM.render(h(Sidebar,{subs,selSub,selEq,setSelSub,
        setSelEq:eid=>{setSelEq(eid);closeDrawer();setTab('designer');},
        setSelBay,addSub,delSub,updateSub,addEq,delEq,updateEq,moveEq,
        askConfirm,askDelete,eqTpls,subTpls,onSaveSubTpl,
        width:'100%',eqTypes,setEqTypes,eqDB,setEqDB,savedByName}),dc);
    }
  });

  const sidebarProps={subs,selSub,selEq,setSelSub,setSelEq,setSelBay,addSub,delSub,updateSub,addEq,delEq,updateEq,moveEq,askConfirm,askDelete,eqTpls,subTpls,onSaveSubTpl,width:sbW,eqTypes,setEqTypes,eqDB,setEqDB,savedByName};

  return h('div',{style:{display:'flex',flexDirection:'column',paddingTop:2,position:'relative',minHeight:600}},
    confirm&&h(ConfirmDlg,{msg:confirm.msg,onYes:()=>{confirm.fn();setConfirm(null);},onNo:()=>setConfirm(null)}),
    saveDlg&&h(SaveTplDlg,{title:saveDlg.title,existing:saveDlg.existing,onSave:saveDlg.onSave,onCancel:()=>setSaveDlg(null)}),
    protectedConfirm&&h(ProtectedConfirmDlg,{msg:protectedConfirm.msg,createdBy:protectedConfirm.createdBy,onYes:()=>{protectedConfirm.fn();setProtectedConfirm(null);},onNo:()=>setProtectedConfirm(null)}),
    showSettings&&h(SettingsModal,{url:sheetsUrl,onSave:saveSettings,onClose:()=>setShowSettings(false)}),
    showChangelog&&h(ChangelogModal,{onClose:()=>setShowChangelog(false)}),
    h(SyncBar,{status:syncStatus,lastSync,savedBy:lastSavedBy,onLoad:loadFromSheets,onSave:saveToSheets,onSettings:()=>setShowSettings(true)}),
    /* ผู้บันทึก */
    h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:6,fontSize:13}},
      h('span',{style:{color:'var(--color-text-secondary)',flexShrink:0}},'ผู้บันทึก:'),
      h('div',{style:{position:'relative',flex:1,maxWidth:300}},
        h('input',{value:savedByName,disabled:!hasLoaded,
          onChange:e=>{if(!hasLoaded)return;const v=e.target.value.replace(/\D/g,'').slice(0,7);setSavedByName(v);try{sessionStorage.setItem('sf6_saved_by',v);}catch(e){}},
          placeholder:hasLoaded?'รหัสพนักงาน 7 หลัก':'กด "โหลด" ก่อนจึงกรอกได้',
          inputMode:'numeric',pattern:'[0-9]*',maxLength:7,
          style:{fontSize:16,paddingRight:hasLoaded?70:8,borderColor:!hasLoaded?'var(--color-border-secondary)':savedByName.length===7?'#1D9E75':savedByName.length>0?'#E24B4A':'var(--color-border-secondary)',background:!hasLoaded?'var(--color-background-secondary)':undefined,cursor:!hasLoaded?'not-allowed':undefined}}),
        hasLoaded&&h('span',{style:{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',fontSize:12,color:savedByName.length===7?'#1D9E75':savedByName.length>0?'#E24B4A':'var(--color-text-secondary)',pointerEvents:'none',whiteSpace:'nowrap'}},
          savedByName.length===7?'✓ พร้อมใช้':`${savedByName.length}/7`)
      )
    ),
    (!hasLoaded||!savedByName||savedByName.length!==7)?h('div',{style:{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',background:'rgba(226,75,74,0.07)',border:'0.5px solid rgba(226,75,74,0.3)',borderRadius:6,marginBottom:8,fontSize:13,color:'#993333'}},
      !hasLoaded
        ?h(React.Fragment,null,'⚠️ กรุณากด ',h('strong',null,'📥 โหลด'),' ก่อน')
        :h(React.Fragment,null,'⚠️ กรุณากรอก ',h('strong',null,'รหัสพนักงาน 7 หลัก'))
    ):null,
    /* main layout */
    h('div',{style:{display:'flex',gap:0,flex:1,minWidth:0}},
      /* Sidebar: desktop only (CSS hides on mobile) */
      h('div',{className:'sidebar-desktop',style:{width:sbW,flexShrink:0,borderRight:'0.5px solid var(--color-border-tertiary)',paddingRight:8,maxHeight:'80vh',overflowY:'auto'}},
        h(Sidebar,sidebarProps)
      ),
      /* Resizer: desktop only */
      h('div',{className:'sidebar-desktop',onMouseDown:onResizerDown,
        style:{width:6,flexShrink:0,cursor:'col-resize',background:'transparent',position:'relative',zIndex:10,margin:'0 2px'},
        onMouseEnter:e=>e.currentTarget.style.background='var(--color-border-secondary)',
        onMouseLeave:e=>{if(!dragging.current)e.currentTarget.style.background='transparent';}},
        h('div',{style:{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',fontSize:14,color:'var(--color-border-secondary)',lineHeight:1,letterSpacing:-2,userSelect:'none',pointerEvents:'none'}},'⋮⋮')
      ),
      /* Content */
      h('div',{style:{flex:1,minWidth:0,paddingLeft:8}},
        /* Tab bar */
        h('div',{className:'tab-bar'},
          TABS.map(({k,l})=>h('button',{key:k,className:'tab-btn',
            style:{color:tab===k?'var(--color-text-primary)':'var(--color-text-secondary)',borderBottom:tab===k?'2px solid var(--color-text-primary)':'2px solid transparent',fontWeight:tab===k?500:400,marginBottom:-1,background:'none',border:'none',borderBottom:tab===k?'2px solid var(--color-text-primary)':'2px solid transparent',cursor:'pointer',padding:'8px 12px',fontSize:13,whiteSpace:'nowrap',minHeight:'40px',touchAction:'manipulation'},
            onClick:()=>setTab(k)},l))
        ),
        tab==='designer'&&eq&&h(DesignerView,{eq,sid:selSub,selBay,setSelBay,lib,setLib,addBayFn,rmModFn,addModFn,edSf6Fn,edSf6PhaseFn,edBayTotFn,saveTplFn,delBayFn,delTplFn,reorderFn,askConfirm,askDelete,mt,setMt,onSaveEqTpl,savedByName}),
        tab==='designer'&&!eq&&h('div',{style:{fontSize:13,color:'var(--color-text-secondary)',padding:'2rem 0',textAlign:'center'}},
          h('div',{style:{marginBottom:12}},'เลือกสถานี/อุปกรณ์จากเมนู'),
          h('button',{style:{...sBP,fontSize:13,padding:'10px 20px'},onClick:()=>openDrawer()},'☰ เปิดเมนูสถานี')
        ),
        tab==='library'&&h(LibraryTab,{lib,setLib,askConfirm,askDelete,mt,setMt,subs,updateMod,eqTypes,setEqTypes,eqDB,setEqDB,savedByName}),
        tab==='templates'&&h(TemplatesTab,{eqTpls,subTpls,askConfirm,onDelEq:id=>setEqTpls(p=>p.filter(t=>t.id!==id)),onDelSub:id=>setSubTpls(p=>p.filter(t=>t.id!==id))}),
        tab==='summary'&&h(SummaryView,{subs})
      )
    )
  );
}
ReactDOM.render(h(App),document.getElementById('root'));
})();
</script>
</body>
</html>
